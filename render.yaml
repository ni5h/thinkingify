services:
  - type: web
    name: thinkingify-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: free
    envVars:
      - key: APP_NAME
        value: Thinkingify API
      - key: DEBUG
        value: "false"
      - key: ALLOW_DEV_LOGIN
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: thinkingify
      - key: ADMIN_EMAILS
        sync: false
      - key: AUTHOR_EMAILS
        sync: false
      - key: LEARNER_EMAILS
        sync: false
      - key: CORS_ORIGINS
        value: https://ni5h.github.io
