name: Deploy ui to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/deploy-ui.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Build
        working-directory: ui
        run: npx ng build --configuration production --base-href /

      - name: Add SPA fallback (404 -> index.html, for client-side routing)
        run: cp ui/dist/thinkingify-ui/browser/index.html ui/dist/thinkingify-ui/browser/404.html

      - name: Add CNAME for custom domain
        run: echo "thinkingify.com" > ui/dist/thinkingify-ui/browser/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist/thinkingify-ui/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
